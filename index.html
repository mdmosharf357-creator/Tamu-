<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy 2nd Anniversary My Love</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --primary-color: #ff4d6d;
            --bg-gradient: linear-gradient(135deg, #ff758c 0%, #ff7eb3 100%);
        }

        body {
            margin: 0; padding: 0; min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
            background: var(--bg-gradient);
            font-family: 'Poppins', sans-serif;
            text-align: center; overflow-x: hidden; color: white;
        }

        #mainContainer { z-index: 10; width: 90%; max-width: 450px; padding: 20px; }

        /* Floating Hearts */
        .heart { position: absolute; color: rgba(255, 255, 255, 0.4); animation: float 5s linear infinite; bottom: -50px; }
        @keyframes float { 0% { transform: translateY(0) rotate(0); opacity: 1; } 100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; } }

        /* Timer Styling */
        #timer {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(5px);
            padding: 15px; border-radius: 15px;
            margin: 20px 0; font-size: 18px; font-weight: bold;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        /* Slideshow Styling */
        .frame {
            position: relative; width: 280px; height: 350px;
            margin: 20px auto; border-radius: 20px;
            overflow: hidden; border: 5px solid white;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }
        .slides { width: 100%; height: 100%; object-fit: cover; display: none; }
        .active { display: block; animation: fade 1s ease-in; }

        @keyframes fade { from { opacity: 0.4; } to { opacity: 1; } }

        .btn-open {
            background: white; color: var(--primary-color);
            border: none; padding: 18px 40px; font-size: 20px;
            font-weight: bold; border-radius: 50px; cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2); transition: 0.3s;
        }

        #message1, #message2 { display: none; }
        h2 { font-size: 28px; text-shadow: 2px 2px 10px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

<div id="heart-bg"></div>

<audio id="bgMusic" loop>
    <source src="romantic_song.mp3" type="audio/mpeg">
</audio>

<div id="mainContainer">
    <div id="firstScreen">
        <h2>🎁 You have a Special Gift Tamu!</h2>
        <button class="btn-open" onclick="startLove()">Open Your Gift 💝</button>
    </div>

    <div id="message1">
        <h2>Happy 2nd Anniversary My Love 😘</h2>
        <div id="timer">Loading our memories...</div>
        <p>You make every second worth living ❤️</p>
    </div>

    <div id="message2">
        <div class="frame">
            <img src="tama.jpg" class="slides active">
           <img src="tama1.jpg" class="slides">
            <img src="tama2.jpg" class="slides">
            <img src="tama3.jpg" class="slides">
        </div>
        <p>প্রেয়সী, এভাবেই আজীবন পাশে থেকো। অনেক ভালোবাসি তোমাকে! ❤️✨</p>
        <p><b>LOVE YOU TAMU😘🥰</b></p>
    </div>
</div>

<script>
    // 1. Confetti & Music Start
    function startLove() {
        document.getElementById("bgMusic").play(); // গান শুরু হবে
        confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } }); // কনফেটি

        document.getElementById("firstScreen").style.display = "none";
        document.getElementById("message1").style.display = "block";

        startTimer(); // টাইমার শুরু

        setTimeout(() => {
            document.getElementById("message1").style.display = "none";
            document.getElementById("message2").style.display = "block";
            startSlideshow(); // স্লাইডশো শুরু
        }, 6000);
    }

    // 2. Countdown Timer Logic (Change the date to your anniversary date)
    function startTimer() {
        const anniversaryDate = new Date("March 03, 2024 00:00:00").getTime(); 
        
        setInterval(() => {
            const now = new Date().getTime();
            const diff = now - anniversaryDate;

            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const mins = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const secs = Math.floor((diff % (1000 * 60)) / 1000);

            document.getElementById("timer").innerHTML = 
                `${days} Days : ${hours}h : ${mins}m : ${secs}s Together`;
        }, 1000);
    }

    // 3. Slideshow Logic
    let slideIndex = 0;
    function startSlideshow() {
        const slides = document.getElementsByClassName("slides");
        setInterval(() => {
            slides[slideIndex].classList.remove("active");
            slideIndex = (slideIndex + 1) % slides.length;
            slides[slideIndex].classList.add("active");
        }, 2500);
    }

    // Floating Hearts
    setInterval(() => {
        const heart = document.createElement('div');
        heart.classList.add('heart');
        heart.innerHTML = '❤️';
        heart.style.left = Math.random() * 100 + 'vw';
        heart.style.animationDuration = Math.random() * 3 + 2 + 's';
        document.getElementById('heart-bg').appendChild(heart);
        setTimeout(() => heart.remove(), 5000);
    }, 300);
</script>

</body>
</html>
